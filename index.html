<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Shopping Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        /* Header */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        .cart {
            background-color: #e74c3c;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Container */
        .container {
            padding: 20px;
        }

        /* Product Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Product Card */
        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .product h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<header>
    <h1>My Shopping Site</h1>
    <div class="cart">Cart 🛒</div>
</header>

<div class="container">

    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Product 1</h3>
            <div class="price">₹999</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Product 2</h3>
            <div class="price">₹1499</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Product 3</h3>
            <div class="price">₹1999</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="">
            <h3>Product 4</h3>
            <div class="price">₹799</div>
            <button class="btn">Add to Cart</button>
        </div>

    </div>

</div>

<footer>
    © 2026 My Shopping Site
</footer>

</body>
</html>
