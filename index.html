<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Shopping Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        /* Header */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        .cart {
            background-color: #e74c3c;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Container */
        .container {
            padding: 20px;
        }

        /* Product Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Product Card */
        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .product h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<header>
    <h1>My Shopping Site</h1>
    <div class="cart">Cart 🛒</div>
</header>

<div class="container">

    <div class="products">

        <div class="product">
            <img src="https://www.google.com/imgres?q=product%20image&imgurl=https%3A%2F%2Fplus.unsplash.com%2Fpremium_photo-1661769750859-64b5f1539aa8%3Ffm%3Djpg%26q%3D60%26w%3D3000%26auto%3Dformat%26fit%3Dcrop%26ixlib%3Drb-4.1.0%26ixid%3DM3wxMjA3fDB8MHxzZWFyY2h8MXx8cHJvZHVjdCUyMGltYWdlfGVufDB8fDB8fHww&imgrefurl=https%3A%2F%2Funsplash.com%2Fs%2Fphotos%2Fproduct-image&docid=aJKAj6c9fWkzSM&tbnid=kUQxjmwcUsSfEM&vet=12ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIERAB..i&w=3000&h=1688&hcb=2&ved=2ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIERAB" alt="">
            <h3>Product 1</h3>
            <div class="price">₹999</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://www.google.com/imgres?q=product%20image&imgurl=https%3A%2F%2Fimg.freepik.com%2Fpremium-vector%2Fsunscreen-product-ads_281653-4687.jpg%3Fsemt%3Dais_rp_progressive%26w%3D740%26q%3D80&imgrefurl=https%3A%2F%2Fwww.freepik.com%2Ffree-photos-vectors%2Fproduct&docid=CC5GUQ8eKalpyM&tbnid=nc6xpPzg6Xs48M&vet=12ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIGhAB..i&w=740&h=999&hcb=2&ved=2ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIGhAB" alt="">
            <h3>Product 2</h3>
            <div class="price">₹1499</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://www.google.com/imgres?q=product%20image&imgurl=https%3A%2F%2Fimages.unsplash.com%2Fphoto-1505740420928-5e560c06d30e%3Ffm%3Djpg%26q%3D60%26w%3D3000%26auto%3Dformat%26fit%3Dcrop%26ixlib%3Drb-4.1.0%26ixid%3DM3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZHVjdCUyMGltYWdlfGVufDB8fDB8fHww&imgrefurl=https%3A%2F%2Funsplash.com%2Fs%2Fphotos%2Fproduct-image&docid=aJKAj6c9fWkzSM&tbnid=TXHC7QxR9Gt2pM&vet=12ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIHRAB..i&w=3000&h=2000&hcb=2&ved=2ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIHRAB" alt="">
            <h3>Product 3</h3>
            <div class="price">₹1999</div>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://www.google.com/imgres?q=product%20image&imgurl=https%3A%2F%2Fd2v5dzhdg4zhx3.cloudfront.net%2Fweb-assets%2Fimages%2Fstorypages%2Fprimary%2FProductShowcasesampleimages%2FJPEG%2FProduct%2BShowcase-1.jpg&imgrefurl=https%3A%2F%2Fwww.lightxeditor.com%2Fphoto-editing%2Famazon-product-showcase-maker%2F&docid=OqiYjCcx1ipSPM&tbnid=B4k0GzSLhz2BJM&vet=12ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIJhAB..i&w=1920&h=1920&hcb=2&ved=2ahUKEwiF5JHLuv6SAxWbzTgGHWy5L5IQnPAOegQIJhAB" alt="">
            <h3>Product 4</h3>
            <div class="price">₹799</div>
            <button class="btn">Add to Cart</button>
        </div>

    </div>

</div>

<footer>
    © 2026 My Shopping Site
</footer>

</body>
</html>
